<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LS3DJFE4XR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LS3DJFE4XR');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="product-page-title">Product Details | Sacred Greek Icons</title>
    <meta name="description" content="View detailed information about our hand-painted Byzantine icons. High-quality religious art available for your collection at Sacred Greek Icons.">
    <meta name="keywords" content="Byzantine Icon details, Orthodox Art Gallery, Hand-painted Icons, Religious Art Collection, Sacred Greek Icons">

    <meta property="og:title" content="Sacred Greek Icons | Product Details">
    <meta property="og:description" content="Explore the craftsmanship and history of our unique hand-painted Byzantine icons.">
    <meta property="og:image" content="https://sacredgreekicons.store/img/logo.png">
    <meta property="og:url" content="https://sacredgreekicons.store/product-page.html">
    <meta property="og:type" content="article">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sacred Greek Icons | Product Gallery">
    <meta name="twitter:description" content="Detailed view of handcrafted Byzantine art.">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header></header> 
    <div class="mobile-sidebar" id="sidebar"></div> 
    <div class="sidebar-overlay" id="overlay"></div>

    <main>
        <div class="breadcrumb-container">
            <nav class="breadcrumbs">
                <a href="index.html">Home</a>
                <span class="separator">/</span>
                <span id="breadcrumb-category">Gallery</span>
                <span class="separator">/</span>
                <span id="breadcrumb-current" class="current">Loading...</span>
            </nav>
        </div>

        <div class="product-container" id="product-details"></div>

        <section class="related-works-section" id="related-section" style="display: none;">
            <h2>Available Now</h2>
            <div class="related-grid" id="related-gallery"></div>
        </section>
    </main>

    <div id="lightbox" class="modal-lightbox">
        <div class="modal-content-wrapper">
            <span class="modal-close" id="close-modal">&times;</span>
            <button class="nav-btn prev-btn" id="prev-image"><i class="fas fa-chevron-left"></i></button>
            <img class="modal-image" id="modal-img" src="" alt="Zoomed view">
            <button class="nav-btn next-btn" id="next-image"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <footer></footer>

    <script src="data.js"></script>
    <script src="components.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let currentImageIndex = 0;
        let productImages = [];
        
        if (typeof iconsData !== 'undefined') {
            const product = iconsData.find(p => 
                p.id === productId || 
                p.title.toLowerCase().replace(/\s+/g, '-') === productId
            );

            const container = document.getElementById("product-details");

            if (product) {
                // 1. ΤΙΤΛΟΣ & BREADCRUMBS
                document.getElementById("product-page-title").innerText = `${product.title} | Sacred Greek Icons`;
                
                const breadcrumbCategory = document.getElementById("breadcrumb-category");
                const breadcrumbCurrent = document.getElementById("breadcrumb-current");

                if (breadcrumbCategory && breadcrumbCurrent) {
                    breadcrumbCategory.innerHTML = product.status === "available" 
                        ? '<a href="index.html#available">Available Now</a>' 
                        : '<a href="index.html#past-works">Past Works</a>';
                    breadcrumbCurrent.innerText = product.title;
                }

                // 2. ΕΙΚΟΝΕΣ
                productImages = product.images || (product.image ? [product.image] : []);
                const mainImageSrc = productImages.length > 0 ? `img/${productImages[0]}` : 'img/placeholder.jpg';

                let thumbnailsHtml = '';
                if (productImages.length > 1) {
                    thumbnailsHtml = '<div class="thumbnail-list">';
                    productImages.forEach((img, index) => {
                        const activeClass = index === 0 ? 'active' : '';
                        thumbnailsHtml += `<div class="thumb-item ${activeClass}" data-index="${index}"><img src="img/${img}"></div>`;
                    });
                    thumbnailsHtml += '</div>';
                }

                // 3. HTML ΠΡΟΪΟΝΤΟΣ ΜΕ TRACKING
                container.innerHTML = `
                    <div class="product-gallery">
                        <div class="main-image-viewer" id="open-lightbox">
                            <img src="${mainImageSrc}" id="main-product-image" alt="${product.title}">
                        </div>
                        ${thumbnailsHtml}
                    </div>
                    <div class="product-info">
                        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
                        <h1>${product.title}</h1>
                        <span class="price">${product.price}</span>
                        <div class="product-description">${product.description || 'Handcrafted Byzantine Icon.'}</div>
                        ${product.status === "available" 
                            ? `<a href="${product.ebayLink}" 
                                  target="_blank" 
                                  class="buy-btn" 
                                  onclick="gtag('event', 'click_ebay', { 'product_name': '${product.title}' });"
                                  style="display: inline-block; width: auto; padding: 1rem 3rem;">
                                  Buy on eBay
                               </a>`
                            : `<span class="sold-tag" style="background: #eee; padding: 1rem 2rem; border-radius: 5px; color: #777; display: inline-block;">Sold</span>`
                        }
                    </div>
                `;

                // 4. SCHEMA MARKUP (SEO)
                const schemaData = {
                    "@context": "https://schema.org/",
                    "@type": "Product",
                    "name": product.title,
                    "image": [`https://sacredgreekicons.store/img/${productImages[0]}`],
                    "description": product.description || "Hand-painted Byzantine Icon by Sacred Greek Icons.",
                    "brand": {
                        "@type": "Brand",
                        "name": "Sacred Greek Icons"
                    },
                    "offers": {
                        "@type": "Offer",
                        "url": window.location.href,
                        "priceCurrency": "USD",
                        "price": product.price.replace(/[^0-9.]/g, ''),
                        "availability": product.status === "available" ? "https://schema.org/InStock" : "https://schema.org/OutOfStock",
                        "itemCondition": "https://schema.org/NewCondition"
                    }
                };
                const scriptSchema = document.createElement('script');
                scriptSchema.type = "application/ld+json";
                scriptSchema.text = JSON.stringify(schemaData);
                document.head.appendChild(scriptSchema);

                // 5. LIGHTBOX & THUMBNAILS LOGIC
                const mainImg = document.getElementById("main-product-image");
                const lightbox = document.getElementById("lightbox");
                const modalImg = document.getElementById("modal-img");

                document.querySelectorAll(".thumb-item").forEach(thumb => {
                    thumb.addEventListener("click", function() {
                        currentImageIndex = parseInt(this.dataset.index);
                        mainImg.src = this.querySelector("img").src;
                        document.querySelector(".thumb-item.active")?.classList.remove("active");
                        this.classList.add("active");
                    });
                });

                document.getElementById("open-lightbox").onclick = () => {
                    lightbox.style.display = "flex";
                    modalImg.src = `img/${productImages[currentImageIndex]}`;
                    document.body.style.overflow = "hidden"; 
                };

                const closeLightbox = () => {
                    lightbox.style.display = "none";
                    document.body.style.overflow = "auto";
                };
                document.getElementById("close-modal").onclick = closeLightbox;
                lightbox.onclick = (e) => { if(e.target === lightbox) closeLightbox(); };

                const navigate = (step) => {
                    currentImageIndex = (currentImageIndex + step + productImages.length) % productImages.length;
                    modalImg.src = `img/${productImages[currentImageIndex]}`;
                };

                document.getElementById("next-image").onclick = (e) => { e.stopPropagation(); navigate(1); };
                document.getElementById("prev-image").onclick = (e) => { e.stopPropagation(); navigate(-1); };

                // 6. RELATED WORKS
                const relatedGallery = document.getElementById("related-gallery");
                const relatedSection = document.getElementById("related-section");
                const otherAvailable = iconsData.filter(item => item.status === 'available' && item.id !== product.id);

                if (otherAvailable.length > 0 && relatedGallery) {
                    relatedSection.style.display = "block";
                    otherAvailable.forEach(item => {
                        const card = document.createElement("div");
                        card.className = "card";
                        card.innerHTML = `
                            <div class="card-image-container"><img src="img/${item.images[0]}" alt="${item.title}"></div>
                            <div class="card-content">
                                <h3>${item.title}</h3>
                                <span class="price">${item.price}</span>
                                <div class="card-buttons">
                                    <a href="product-page.html?id=${item.id}" 
                                       class="view-btn" 
                                       onclick="gtag('event', 'click_related', { 'product_name': '${item.title}' });"
                                       style="width: 100%; text-align: center;">Details</a>
                                </div>
                            </div>
                        `;
                        relatedGallery.appendChild(card);
                    });
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } else {
                container.innerHTML = "<div style='text-align:center; padding: 5rem;'><h1>Product not found</h1><a href='index.html'>Back Home</a></div>";
            }
        }
    });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="product-page-title">Λεπτομέρειες Προϊόντος | LezasIcon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
</head>
<body>
<header></header> <div class="mobile-sidebar" id="sidebar"></div> <div class="sidebar-overlay" id="overlay"></div>

    <main>
        <div class="breadcrumb-container">
        <nav class="breadcrumbs">
            <a href="index.html">Home</a>
            <span class="separator">/</span>
            <span id="breadcrumb-category">Gallery</span>
            <span class="separator">/</span>
            <span id="breadcrumb-current" class="current">Loading...</span>
        </nav>
    </div>
        <div class="product-container" id="product-details">
            </div>

        <section class="related-works-section" id="related-section" style="display: none;">
            <h2>Available Now</h2>
            <div class="related-grid" id="related-gallery">
                </div>
        </section>
    </main>

<footer></footer>

    <script src="data.js"></script>
    <script src="components.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        if (typeof iconsData !== 'undefined') {
            const product = iconsData.find(p => 
                p.id === productId || 
                p.title.toLowerCase().replace(/\s+/g, '-') === productId
            );

            const container = document.getElementById("product-details");

            if (product) {
                // 1. ΕΝΗΜΕΡΩΣΗ ΤΙΤΛΟΥ ΚΑΙ BREADCRUMBS
                document.getElementById("product-page-title").innerText = `${product.title} | LezasIcon`;
                
                const breadcrumbCategory = document.getElementById("breadcrumb-category");
                const breadcrumbCurrent = document.getElementById("breadcrumb-current");

                if (breadcrumbCategory && breadcrumbCurrent) {
                    breadcrumbCategory.innerHTML = product.status === "available" 
                        ? '<a href="index.html#available">Available Now</a>' 
                        : '<a href="index.html#past-works">Past Works</a>';
                    breadcrumbCurrent.innerText = product.title;
                }

                // 2. ΠΡΟΕΤΟΙΜΑΣΙΑ ΕΙΚΟΝΩΝ
                const isAvailable = product.status === "available";
                const productImages = product.images || (product.image ? [product.image] : []);
                const mainImageSrc = productImages.length > 0 ? `img/${productImages[0]}` : 'img/placeholder.jpg';

                let thumbnailsHtml = '';
                if (productImages.length > 1) {
                    thumbnailsHtml = '<div class="thumbnail-list">';
                    productImages.forEach((img, index) => {
                        const activeClass = index === 0 ? 'active' : '';
                        thumbnailsHtml += `<div class="thumb-item ${activeClass}"><img src="img/${img}"></div>`;
                    });
                    thumbnailsHtml += '</div>';
                }

                // 3. ΕΜΦΑΝΙΣΗ ΚΥΡΙΟΥ ΠΕΡΙΕΧΟΜΕΝΟΥ
                container.innerHTML = `
                    <div class="product-gallery">
                        <div class="main-image-viewer">
                            <img src="${mainImageSrc}" id="main-product-image" alt="${product.title}">
                        </div>
                        ${thumbnailsHtml}
                    </div>
                    <div class="product-info">
                        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
                        <h1>${product.title}</h1>
                        <span class="price">${product.price}</span>
                        <p class="product-description">${product.description || 'Χειροποίητη βυζαντινή εικόνα υψηλής ποιότητας.'}</p>
                        ${isAvailable 
                            ? `<a href="${product.ebayLink}" target="_blank" class="buy-btn" style="display: inline-block; width: auto; padding: 1rem 3rem;">Αγορά στο eBay</a>`
                            : `<span class="sold-tag" style="background: #eee; padding: 1rem 2rem; border-radius: 5px; color: #777; display: inline-block;">Εξαντλήθηκε / Sold</span>`
                        }
                    </div>
                `;

                // 4. LOGIC ΓΙΑ THUMBNAILS (Εναλλαγή εικόνων)
                const mainImg = document.getElementById("main-product-image");
                document.querySelectorAll(".thumb-item").forEach(thumb => {
                    thumb.addEventListener("click", function() {
                        mainImg.src = this.querySelector("img").src;
                        const currentActive = document.querySelector(".thumb-item.active");
                        if (currentActive) currentActive.classList.remove("active");
                        this.classList.add("active");
                    });
                });

                // 5. ΕΜΦΑΝΙΣΗ ΣΧΕΤΙΚΩΝ ΕΡΓΩΝ (RELATED WORKS)
                const relatedGallery = document.getElementById("related-gallery");
                const relatedSection = document.getElementById("related-section");
                
                const otherAvailable = iconsData.filter(item => 
                    item.status === 'available' && item.id !== product.id
                );

                if (otherAvailable.length > 0 && relatedGallery) {
                    relatedSection.style.display = "block";
                    relatedGallery.innerHTML = ''; // Καθαρισμός πριν το γέμισμα
                    otherAvailable.forEach(item => {
                        const card = document.createElement("div");
                        card.className = "card";
                        const itemImg = (item.images && item.images.length > 0) ? item.images[0] : 'placeholder.jpg';
                        
                        card.innerHTML = `
                            <div class="card-image-container">
                                <img src="img/${itemImg}" alt="${item.title}">
                            </div>
                            <div class="card-content">
                                <h3>${item.title}</h3>
                                <span class="price">${item.price}</span>
                                <div class="card-buttons">
                                    <a href="product-page.html?id=${item.id}" class="view-btn" style="width: 100%; text-align: center;">Details</a>
                                </div>
                            </div>
                        `;
                        relatedGallery.appendChild(card);
                    });
                }

                // Smooth scroll στην κορυφή αφού φορτωθεί το προϊόν
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } else {
                container.innerHTML = "<div style='text-align:center; padding: 5rem;'><h1>Το προϊόν δεν βρέθηκε</h1><a href='index.html' class='back-link'>Επιστροφή στην Αρχική</a></div>";
            }
        }
    });
</script>
    
</body>
</html>

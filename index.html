<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading...</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
                <span class="menu-text">Menu</span>
            </div>
            <div class="main-logo">
                <img src="img/logo.png" alt="LezasIcon Logo">
                <!-- <p class="logo-text" id="logo-text"></p>
                <p class="logo-tagline" id="logo-tagline"></p> -->
            </div>
            <div class="user-actions">
                <a href="#" class="action-icon"><i class="fas fa-user"></i></a>
                <a href="#" class="action-icon cart-icon">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-text-content">
                <p class="hero-subtitle" id="hero-subtitle"></p>
                <h1 class="hero-title" id="hero-title"></h1>
                <p class="hero-description" id="hero-description"></p>
                <a href="#available" class="btn hero-btn" id="hero-button"><i class="fas fa-palette"></i> </a>
            </div>
            <div class="hero-image-container">
                <img src="img/hero_img.png" alt="Orthodox Icon" class="hero-image">
            </div>
        </section>

        <section id="available" class="gallery-section">
            <h2>Available Now</h2>
            <p class="section-desc">These icons are currently available for purchase on eBay.</p>
            <div class="gallery-grid" id="available-gallery">
                </div>
        </section>

        <section id="past-works" class="gallery-section alt-bg">
            <h2>Past Works</h2>
            <p class="section-desc">A selection of my previous commissions and sold works.</p>
            <div class="gallery-grid" id="past-gallery">
                </div>
        </section>
    </main>

    <footer id="contact">
        <p>&copy; 2026 LezasIcon. All rights reserved.</p>
        <p>Find me on <a href="https://www.ebay.com" target="_blank">eBay</a></p>
    </footer>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Gallery of Past Works | Sacred Greek Icons</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header></header>
    <div class="mobile-sidebar" id="sidebar"></div>
    <div class="sidebar-overlay" id="overlay"></div>

    <main>
        <div class="breadcrumb-container">
            <nav class="breadcrumbs">
                <a href="index.html">Home</a>
                <span class="separator">/</span>
                <span class="current">All Past Works</span>
            </nav>
        </div>

        <section class="gallery-section">
            <h1 class="section-title">Gallery of Past Works</h1>
            <p class="section-desc">Explore our collection of some of the handcrafted icons created over the years.</p>
            <div class="gallery-grid" id="full-past-gallery">
                </div>
        </section>
    </main>

    <footer></footer>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="components.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const fullGallery = document.getElementById("full-past-gallery");
            if (typeof iconsData !== 'undefined' && fullGallery) {
                // Φιλτράρουμε μόνο τα past works
                const pastWorks = iconsData.filter(icon => icon.status === 'past');
                
                pastWorks.forEach(icon => {
                    const card = document.createElement("div");
                    card.className = "card";
                    const firstImg = icon.images[0];
                    
                    card.innerHTML = `
                        <div class="card-image-container">
                            <img src="img/${firstImg}" alt="${icon.title}" loading="lazy">
                        </div>
                        <div class="card-content">
                            <h3>${icon.title}</h3>
                            <span class="price">Sold</span>
                            <div class="card-buttons">
                                <a href="product-page.html?id=${icon.id}" class="view-btn" style="width: 100%; text-align: center;">Details</a>
                            </div>
                        </div>
                    `;
                    fullGallery.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
